resolver 127.0.0.11 valid=30s;

server {
    listen 8400;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy admin API requests to FastAPI backend.
    # Using a variable forces nginx to resolve at request time rather than
    # at startup, so the container can start before donna-api is available.
    location /admin/ {
        set $backend http://donna-api:8200;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/calendar/.+ {
        set $backend http://donna-api:8200;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
