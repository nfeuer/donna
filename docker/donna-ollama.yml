# Donna Local LLM Stack
# Ollama with dedicated RTX 3090 GPU for local inference

services:
  donna-ollama:
    image: ollama/ollama:latest
    container_name: donna-ollama
    restart: unless-stopped
    environment:
      - OLLAMA_NUM_CTX=8192
      - OLLAMA_FLASH_ATTENTION=1
    volumes:
      - ${DONNA_DATA_PATH}/models:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${DONNA_OLLAMA_GPU_ID}"]
              capabilities: [gpu]
    healthcheck:
      # The ollama image ships neither curl nor wget; use the bundled CLI.
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - homelab
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  homelab:
    external: true
