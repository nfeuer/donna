# Donna Monitoring Stack
# Grafana + Loki + Promtail for observability dashboard

services:
  donna-loki:
    image: grafana/loki:2.9.0
    container_name: donna-loki
    restart: unless-stopped
    volumes:
      - donna-loki-data:/loki
      - ./loki/local-config.yaml:/etc/loki/local-config.yaml:ro
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - homelab
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  donna-promtail:
    image: grafana/promtail:2.9.0
    container_name: donna-promtail
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - donna-loki
    networks:
      - homelab
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  donna-grafana:
    image: grafana/grafana:10.2.0
    container_name: donna-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      # Wave 3 F-12: skill-system cost panel reads invocation_log directly.
      # frser-sqlite-datasource is community-maintained (unsigned), so we
      # opt it in via the allow-list rather than running unsigned plugins globally.
      - GF_INSTALL_PLUGINS=frser-sqlite-datasource
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=frser-sqlite-datasource
    volumes:
      - donna-grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      # Same host path the orchestrator mounts at /donna/db. Read-only keeps
      # Grafana from ever writing; SQLite WAL mode (see CLAUDE.md) supports
      # one writer + concurrent readers, so no lock contention with the
      # orchestrator's writes.
      - ${DONNA_DB_PATH}:/var/lib/donna/db:ro
    ports:
      - "3000:3000"
    depends_on:
      - donna-loki
    networks:
      - homelab
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  donna-loki-data:
  donna-grafana-data:

networks:
  homelab:
    external: true
