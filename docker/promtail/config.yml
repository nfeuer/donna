server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://donna-loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: donna-docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values:
              - donna-orchestrator
              - donna-loki
              - donna-promtail
              - donna-grafana
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container_name
      - source_labels: [__meta_docker_container_id]
        target_label: container_id
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
    pipeline_stages:
      - json:
          expressions:
            level: level
            event: event
            event_type: event_type
            service: service
            component: component
            correlation_id: correlation_id
            task_id: task_id
            user_id: user_id
            skill_id: skill_id
            task_type: task_type
      - labels:
          level:
          event_type:
          service:
          component:
          skill_id:
          task_type:
