# Donna App Backend
# FastAPI REST API for Flutter Web/Mobile app (Phase 4)

services:
  donna-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: donna-api
    restart: unless-stopped
    env_file: .env
    environment:
      - DONNA_DB_PATH=/donna/db/donna_tasks.db
    volumes:
      - ${DONNA_DB_PATH}:/donna/db
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - homelab
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  donna-browser:
    build:
      context: ..
      dockerfile: docker/browser-sidecar/Dockerfile
    container_name: donna-browser
    restart: unless-stopped
    environment:
      - BROWSER_DATA_DIR=/data/browser
    volumes:
      - browser-data:/data/browser
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/gallery"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - homelab
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  homelab:
    external: true

volumes:
  browser-data:
