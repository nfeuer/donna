# Donna App Backend
# FastAPI REST API for Flutter Web/Mobile app (Phase 4)

services:
  donna-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: donna-api
    restart: unless-stopped
    env_file: .env
    environment:
      - DONNA_DB_PATH=/donna/db/donna_tasks.db
      - DONNA_PAYLOAD_DIR=/donna/db/payloads
    volumes:
      - ${DONNA_DB_PATH}:/donna/db
      - ${DONNA_VAULT_PATH}:/donna/vault:ro
      - ${DONNA_DATA_PATH}/donna/config:/app/config
    ports:
      # Loopback-only: Caddy reaches the API via the homelab Docker network
      # (donna-api:8200), so the host port need not be LAN-exposed. Keeps the
      # admin surface off the LAN. (audit 2026-07-02 §3 finding #4)
      - "127.0.0.1:8200:8200"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8200/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - homelab
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  donna-browser:
    build:
      context: ../docker/browser-sidecar
      dockerfile: Dockerfile
    container_name: donna-browser
    restart: unless-stopped
    environment:
      - BROWSER_DATA_DIR=/data/browser
    volumes:
      - browser-data:/data/browser
    ports:
      # Loopback-only: the orchestrator drives the browser over the homelab
      # Docker network (donna-browser:3100); no LAN access to the control port.
      # (audit 2026-07-02 §3 finding #4)
      - "127.0.0.1:3101:3100"
    healthcheck:
      # The browser-sidecar image ships wget (for the Chrome install), not curl.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3100/gallery"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - homelab
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  homelab:
    external: true

volumes:
  browser-data:
