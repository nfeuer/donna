# Donna Core Services
# Orchestrator, integration layer, notification service, Discord bot

services:
  donna-orchestrator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.orchestrator
    container_name: donna-orchestrator
    restart: unless-stopped
    env_file: .env
    environment:
      - DONNA_DATA_PATH=/donna
      - DONNA_DB_PATH=/donna/db/donna_tasks.db
      - DONNA_PAYLOAD_DIR=/donna/db/payloads
      - DONNA_WORKSPACE_PATH=/donna/workspace
      - DONNA_BACKUP_PATH=/donna/backups
      - DONNA_LOG_PATH=/donna/logs
      - DONNA_VAULT_PATH=/donna/vault
      - DONNA_HEADLESS=true
      - GOOGLE_CREDENTIALS_PATH=/donna/config/google_credentials.json
      - HEALTHWATCH_HEARTBEAT_PATH=/donna/healthwatch/heartbeat
      - HEALTHWATCH_STALE_SECONDS=${HEALTHWATCH_STALE_SECONDS:-90}
    volumes:
      - ${DONNA_DB_PATH}:/donna/db
      - ${DONNA_WORKSPACE_PATH}:/donna/workspace
      - ${DONNA_BACKUP_PATH}:/donna/backups
      - ${DONNA_LOG_PATH}:/donna/logs
      - ${DONNA_VAULT_PATH}:/donna/vault
      - ../config:/donna/config
      - ../prompts:/app/prompts:ro
      - ../schemas:/app/schemas:ro
      - browser-data:/data/browser
      - /mnt/donna/healthwatch:/donna/healthwatch:ro
    ports:
      - "8100:8100"    # Health endpoint
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - homelab
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

networks:
  homelab:
    external: true

volumes:
  browser-data:
    external: true
