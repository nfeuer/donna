name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv sync --dev
      - run: uv run ruff check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv sync --dev
      - run: uv run mypy src/donna/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv sync --dev
      - run: uv run pytest tests/unit/ -m "not slow and not llm" --tb=short -q

  test-integration:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv sync --dev
      - run: uv run pytest tests/integration/ -m "not slow and not llm" -k "not test_api_no_skill and not test_calendar_sync and not test_chat_smoke and not test_run_now_endpoint and not test_wire_automation_subsystem_registers_cadence_reclamper" --tb=short -q

  docker-copy-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify API Dockerfile copies all runtime directories from orchestrator
        run: |
          extract_copies() { grep '^COPY' "$1" | awk '{print $2}' | sort; }
          orch=$(extract_copies docker/Dockerfile.orchestrator)
          api=$(extract_copies docker/Dockerfile.api)
          missing=$(comm -23 <(echo "$orch") <(echo "$api"))
          if [ -n "$missing" ]; then
            echo "::error::Dockerfile.api is missing COPY directives present in Dockerfile.orchestrator:"
            echo "$missing"
            exit 1
          fi
