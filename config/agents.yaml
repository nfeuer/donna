# Agent configuration — Phase 3
# See docs/agents.md for the full agent hierarchy

agents:
  pm:
    enabled: true
    timeout_seconds: 300       # 5 minutes
    autonomy: medium           # can decompose and route, must confirm requirements with user
    allowed_tools:
      - task_db_read
      - task_db_write
      # Vault (slice 12)
      - vault_read
      - vault_write
      - vault_list
      - vault_link
      - vault_undo_last
      # Memory (slice 13)
      - memory_search

  scheduler:
    enabled: true
    timeout_seconds: 120       # 2 minutes
    autonomy: high             # auto-schedules priority 1-3
    allowed_tools:
      - calendar_read
      - calendar_write
      - task_db_read
      - task_db_write
      # Vault (slice 12)
      - vault_read
      - vault_write
      - vault_list
      - vault_link
      - vault_undo_last
      # Memory (slice 13)
      - memory_search

  research:
    enabled: true
    timeout_seconds: 300       # 5 minutes
    autonomy: high             # runs autonomously when prep flagged
    allowed_tools:
      - web_search
      - email_read
      - notes_read
      - fs_read
      # Vault (slice 12)
      - vault_read
      - vault_write
      - vault_list
      - vault_link
      - vault_undo_last
      # Memory (slice 13)
      - memory_search

  coding:
    enabled: false             # Phase 4 — needs Stage 3 tool progression
    timeout_seconds: 600       # 10 minutes
    autonomy: low              # output for review only
    allowed_tools:
      - fs_read
      - fs_write
      - github_read
      - github_write

  challenger:
    enabled: true
    timeout_seconds: 120       # 2 minutes
    autonomy: medium           # probes task quality, returns questions to user
    allowed_tools:
      - task_db_read
      # Vault (slice 12)
      - vault_read
      - vault_write
      - vault_list
      - vault_link
      - vault_undo_last
      # Memory (slice 13)
      - memory_search

  communication:
    enabled: false             # Phase 4 — always drafts, never sends
    timeout_seconds: 300       # 5 minutes
    autonomy: low
    allowed_tools:
      - email_draft
      - docs_write
      - discord_write
